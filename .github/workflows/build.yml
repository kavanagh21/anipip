name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: AnalysisPipeline-Windows
            asset_name: AnalysisPipeline-Windows.zip
          - os: macos-latest
            artifact_name: AnalysisPipeline-macOS
            asset_name: AnalysisPipeline-macOS.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install "PyQt6>=6.5.0" "numpy>=1.24.0" "Pillow>=10.0.0" "tifffile>=2023.0.0" "scikit-image>=0.21.0" "openpyxl>=3.1.0"

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --name "AnalysisPipeline" --windowed --noconfirm --clean --add-data "plugins;plugins" --add-data "core;core" --add-data "gui;gui" --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --hidden-import "numpy" --hidden-import "PIL" --hidden-import "tifffile" --hidden-import "skimage" --hidden-import "openpyxl" --hidden-import "scipy" main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --name "AnalysisPipeline" --windowed --noconfirm --clean --add-data "plugins:plugins" --add-data "core:core" --add-data "gui:gui" --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --hidden-import "numpy" --hidden-import "PIL" --hidden-import "tifffile" --hidden-import "skimage" --hidden-import "openpyxl" --hidden-import "scipy" main.py

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          Compress-Archive -Path "AnalysisPipeline" -DestinationPath "${{ matrix.asset_name }}"
        shell: pwsh

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "${{ matrix.asset_name }}" "AnalysisPipeline.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AnalysisPipeline-Windows/AnalysisPipeline-Windows.zip
            AnalysisPipeline-macOS/AnalysisPipeline-macOS.zip
